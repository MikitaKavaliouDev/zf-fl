name: ziro_fit
description: "ZIRO.FIT — Flutter fitness training platform."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.12.2

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # State Management
  flutter_bloc: ^9.1.1

  # DI
  get_it: ^9.2.1
  injectable: ^3.0.0

  # Networking
  dio: ^5.7.0

  # Local Database (drift / SQLite)
  drift: ^2.25.0
  sqlite3_flutter_libs: ^0.6.0+eol
  sqlite3: ^3.3.3
  path_provider: ^2.1.0
  path: ^1.9.0

  # Maps (OpenStreetMap)
  flutter_map: ^8.3.0
  latlong2: ^0.9.0

  # Payments
  flutter_stripe: ^13.0.0

  # Auth / Secure Storage
  flutter_secure_storage: ^10.3.1

  # Connectivity
  connectivity_plus: ^7.1.1

  # Code generation support
  freezed_annotation: ^3.1.0
  json_annotation: ^4.9.0

  # Routing
  go_router: ^17.3.0

  # Utilities
  intl: ^0.20.2
  uuid: ^4.5.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

  # Code generators
  build_runner: ">=2.10.0 <2.15.0"
  injectable_generator: ^3.0.2
  drift_dev: ^2.25.0
  freezed: ^3.2.6-dev.1
  json_serializable: ^6.8.0

  # Testing
  bloc_test: ^10.0.0
  mocktail: ^1.0.4

flutter:
  uses-material-design: true
