name: ziro_fit
description: "ZIRO.FIT — Flutter fitness training platform."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.12.2

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # State Management
  flutter_bloc: ^9.1.1

  # DI
  get_it: ^9.2.1
  injectable: ^3.0.0

  # Networking
  dio: ^5.7.0

  # Local Database (drift / SQLite)
  drift: ^2.25.0
  sqlite3_flutter_libs: ^0.6.0+eol
  sqlite3: ^3.3.3
  path_provider: ^2.1.0
  path: ^1.9.0

  # Maps (OpenStreetMap)
  flutter_map: ^8.3.0
  latlong2: ^0.9.0

  # Location
  geolocator: ^13.0.0

  # Payments
  flutter_stripe: ^13.0.0

  # Auth / Secure Storage
  flutter_secure_storage: ^10.3.1

  # Connectivity
  connectivity_plus: ^7.1.1

  # TanStack Query for Flutter (automatic caching, stale-while-revalidate)
  tanquery_flutter: ^0.8.0

  # Supabase (realtime subscriptions)
  supabase_flutter: ^2.0.0

  # Code generation support
  freezed_annotation: ^3.1.0
  json_annotation: ^4.12.0

  # Annotations (VisibleForTesting, etc.)
  meta: ^1.16.0

  # Routing
  go_router: ^17.3.0

  # URL launching (Stripe checkout, deep links)
  url_launcher: ^6.3.1

  # Utilities
  intl: ^0.20.2
  uuid: ^4.5.1
  add_2_calendar: ^3.0.1
  fl_chart: ^1.2.0
  flutter_local_notifications: ^18.0.1
  image_picker: ^1.1.2
  shared_preferences: ^2.3.4
  cached_network_image: ^3.4.1

  # ElevenLabs Conversational AI Agent
  elevenlabs_agents: ^0.6.1

  # Microphone permission
  permission_handler: ^11.3.1
  flutter_launcher_icons: ^0.14.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

  # Code generators
  build_runner: ">=2.10.0 <2.15.0"
  injectable_generator: ^3.0.2
  drift_dev: ^2.25.0
  freezed: ^3.2.6-dev.1
  json_serializable: ^6.8.0

  # Testing
  bloc_test: ^10.0.0
  mocktail: ^1.0.4
  patrol: ^4.6.1
  patrol_finders: ^3.5.0

patrol:
  app_name: Ziro Fit
  test_directory: test/e2e

flutter:
  uses-material-design: true

  assets:
    - assets/images/

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/AppIcon.png"
  remove_alpha_ios: true
  adaptive_icon_background: "#007aff"
  adaptive_icon_foreground: "assets/images/AppIcon.png"
